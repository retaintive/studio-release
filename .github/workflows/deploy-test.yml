name: Deploy Test

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Source ref/sha to deploy"
        type: string
        default: main
      deploy_web:
        description: "Deploy frontend"
        type: boolean
        default: true
      deploy_api:
        description: "Deploy backend"
        type: boolean
        default: true
  repository_dispatch:
    types: [deploy-test]

permissions:
  contents: read
  id-token: write

env:
  BUN_JSC_forceRAMSize: "4294967296"
  PUPPETEER_SKIP_DOWNLOAD: "true"

concurrency:
  group: deploy-test
  cancel-in-progress: false

jobs:
  resolve:
    name: 🧭 Resolve inputs
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      ref: ${{ steps.r.outputs.ref }}
      web: ${{ steps.r.outputs.web }}
      api: ${{ steps.r.outputs.api }}
    steps:
      - id: r
        env:
          EVENT: ${{ github.event_name }}
          IN_REF: ${{ inputs.ref }}
          IN_WEB: ${{ inputs.deploy_web }}
          IN_API: ${{ inputs.deploy_api }}
          CP_REF: ${{ github.event.client_payload.sha }}
          CP_WEB: ${{ github.event.client_payload.deploy_web == false && 'false' || 'true' }}
          CP_API: ${{ github.event.client_payload.deploy_api == false && 'false' || 'true' }}
        run: |
          if [ "$EVENT" = "repository_dispatch" ]; then
            echo "ref=${CP_REF:-main}" >> "$GITHUB_OUTPUT"
            echo "web=$CP_WEB" >> "$GITHUB_OUTPUT"
            echo "api=$CP_API" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${IN_REF:-main}" >> "$GITHUB_OUTPUT"
            echo "web=$IN_WEB" >> "$GITHUB_OUTPUT"
            echo "api=$IN_API" >> "$GITHUB_OUTPUT"
          fi

  deploy-web:
    name: 🌐 Deploy Frontend
    runs-on: ubuntu-latest
    needs: resolve
    if: needs.resolve.outputs.web == 'true'
    timeout-minutes: 10

    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ needs.resolve.outputs.ref }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Resolve commit sha
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Build frontend
        run: cd apps/web && bun run build
        env:
          VITE_USER_POOL_ID: ${{ secrets.VITE_USER_POOL_ID_TEST }}
          VITE_USER_POOL_CLIENT_ID: ${{ secrets.VITE_USER_POOL_CLIENT_ID_TEST }}
          VITE_ENV: test
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VITE_CF_PAGES_COMMIT_SHA: ${{ steps.sha.outputs.sha }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy apps/web/dist --project-name="${{ vars.CF_PAGES_PROJECT }}" --commit-message="Deploy ${{ steps.sha.outputs.sha }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test frontend
        env:
          WEB_URL: ${{ vars.WEB_URL }}
        run: |
          for i in 1 2 3; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$WEB_URL")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Frontend smoke test passed (HTTP $HTTP_STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_STATUS, retrying in 10s..."
            sleep 10
          done
          echo "::error::Frontend smoke test failed after 3 attempts (last HTTP $HTTP_STATUS)"
          exit 1

  deploy-api:
    name: 🔧 Deploy Backend
    runs-on: ubuntu-latest
    needs: resolve
    if: needs.resolve.outputs.api == 'true'
    timeout-minutes: 15
    environment: test

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SOURCE_REPO }}
          ref: ${{ needs.resolve.outputs.ref }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Resolve commit sha
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_ROLE_NAME }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-Deploy-Test

      - name: Verify AWS credentials
        run: aws sts get-caller-identity --query Account --output text > /dev/null && echo "AWS credentials OK"

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Install Lambda layer
        run: cd apps/api/layer/nodejs && bun install --production

      - name: Build Lambda artifacts
        run: cd apps/api && bun run build

      - name: Install CDK dependencies
        run: cd apps/api/infra && bun install

      - name: CDK Diff
        run: |
          cd apps/api/infra
          set +eo pipefail
          bunx cdk diff --all --context environment=test 2>&1 | tee /tmp/cdk-diff.txt
          CDK_EXIT=${PIPESTATUS[0]}
          set -eo pipefail
          if [ "$CDK_EXIT" -gt 1 ]; then
            echo "::error::CDK diff failed with exit code $CDK_EXIT"
            exit 1
          fi

      - name: CDK Deploy
        run: |
          cd apps/api/infra
          bunx cdk deploy --all \
            --context environment=test \
            --require-approval never
        env:
          SENTRY_RELEASE: ${{ steps.sha.outputs.sha }}

      - name: Smoke test API
        env:
          API_URL: ${{ vars.API_URL }}
        run: |
          for i in 1 2 3; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$API_URL/health")
            if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "401" ]; then
              echo "API smoke test passed (HTTP $HTTP_STATUS)"
              break
            fi
            echo "Attempt $i: HTTP $HTTP_STATUS, retrying in 10s..."
            sleep 10
            if [ "$i" = "3" ]; then
              echo "::error::API smoke test failed after 3 attempts (last HTTP $HTTP_STATUS)"
              exit 1
            fi
          done

      - name: Smoke test credential Lambdas
        env:
          ENV: test
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: ./.github/scripts/smoke-test-credential-lambdas.sh
